<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>188본부 시스템안내서 | 188 프라임에셋</title>
  <meta name="description" content="188본부 시스템안내서와 위촉진행 AI 챗봇을 확인하는 페이지입니다.">
  <meta name="theme-color" content="#0a0c10">
  <link rel="stylesheet" href="/assets/design-tokens.css">
  <link rel="stylesheet" href="/assets/hub-menu.css">
  <style>
    /* === 페이지 전용 (토큰은 design-tokens.css) — 블랙골드 Liquid Glass ===
       가독성 최우선: 유리는 네비/카드/입력영역에만, 채팅 대화창(스크롤 영역)은 솔리드 가독면. */
    :root {
      --ink: var(--text);
      --muted: var(--text-dim);
      --line: var(--glass-edge);
      --silver: #e6e9ef;
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; scroll-behavior: smooth; background: var(--bg); }
    body {
      min-height: 100%;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(200,169,106,.10), transparent 34%),
        linear-gradient(225deg, rgba(92,113,145,.14), transparent 42%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--glass-edge);
      background: rgba(10, 12, 16, .62);
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .06) inset;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
    }
    .mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(200, 169, 106, .55);
      border-radius: 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(200, 169, 106, .20), rgba(255, 255, 255, .04));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .22), 0 10px 24px rgba(0, 0, 0, .26);
      flex: 0 0 auto;
    }
    .brand-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, rgba(255, 255, 255, .10), rgba(255, 255, 255, .03));
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--dur) var(--ease-spring), border-color var(--dur), color var(--dur);
    }
    .btn:hover { transform: translateY(-2px); border-color: var(--gold); color: #fff; }
    .btn:active { transform: scale(.96); }
    .btn.primary {
      border-color: rgba(200, 169, 106, .7);
      color: #14110a;
      background: linear-gradient(180deg, #ecdaae, #d2ad5c 54%, #b68a3f);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .56), 0 12px 28px rgba(200, 169, 106, .20);
    }
    .btn.primary:hover { border-color: #f0e1ba; }
    .guide-wrap {
      position: relative;
      padding: 16px 16px 0;
      background: transparent;
    }
    iframe {
      width: 100%;
      height: clamp(420px, 48vh, 520px);
      min-height: 420px;
      display: block;
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius);
      background: #f7f3ea;
      box-shadow: var(--glass-shadow);
    }
    .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }
    .fallback-card {
      width: min(460px, 100%);
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius);
      background: var(--glass-bg);
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      padding: 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s ease, transform .25s var(--ease-spring);
      pointer-events: auto;
    }
    .fallback.show .fallback-card { opacity: 1; transform: none; }
    .fallback h1 { margin: 0; font-size: 20px; }
    .fallback p {
      margin: 10px 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      word-break: keep-all;
    }
    .chat-band {
      padding: 16px 16px 40px;
      background: transparent;
    }
    /* 유리 테두리 셸 — 내부 대화면은 솔리드로 가독성 확보 */
    .chat-shell {
      width: min(940px, 100%);
      margin: 0 auto;
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius);
      background: var(--glass-bg);
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      overflow: hidden;
    }
    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--glass-edge);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
    }
    .chat-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      color: var(--silver);
      font-weight: 800;
      word-break: keep-all;
    }
    .chat-state {
      color: var(--gold);
      font-size: 12px;
      white-space: nowrap;
    }
    .chat-log {
      min-height: 220px;
      max-height: 520px;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: rgba(8, 10, 14, .55);
    }
    .msg {
      width: min(760px, 100%);
      display: grid;
      gap: 6px;
    }
    .msg.user { align-self: flex-end; }
    .msg.ai { align-self: flex-start; }
    .bubble {
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 15px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .user .bubble {
      background: linear-gradient(180deg, #ecdaae, #d2ad5c 56%, #b68a3f);
      color: #14110a;
      font-weight: 720;
    }
    .ai .bubble {
      border: 1px solid var(--glass-edge);
      background: rgba(255, 255, 255, .06);
      color: #eef1f5;
    }
    .ai .bubble p {
      margin: 0 0 10px;
    }
    .ai .bubble p:last-child {
      margin-bottom: 0;
    }
    .ai .bubble ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }
    .ai .bubble li {
      margin: 5px 0;
    }
    .chat-notice {
      border: 1px solid rgba(200, 169, 106, .42);
      border-radius: 0;
      padding: 11px 16px;
      background: linear-gradient(180deg, rgba(200, 169, 106, .16), rgba(200, 169, 106, .06));
      color: #f0e2c2;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
      word-break: keep-all;
    }
    .meta {
      color: var(--text-dim);
      font-size: 12px;
      padding: 0 2px;
    }
    .user .meta { text-align: right; }
    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--glass-edge);
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.03));
    }
    .chat-input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--glass-edge);
      border-radius: 12px;
      padding: 0 14px;
      background: rgba(8, 10, 14, .6);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color var(--dur), box-shadow var(--dur);
    }
    .chat-input::placeholder { color: rgba(242,243,245,.42); }
    .chat-input:focus {
      border-color: rgba(200, 169, 106, .72);
      box-shadow: 0 0 0 3px rgba(200, 169, 106, .16);
    }
    .send {
      min-width: 86px;
      min-height: 46px;
    }
    .send:disabled, .chat-input:disabled {
      opacity: .6;
      cursor: progress;
    }
    @media (max-width: 640px) {
      .topbar { padding: 10px 12px; }
      .brand-text { max-width: 150px; }
      .btn { padding: 0 14px; font-size: 12px; }
      iframe { height: 390px; min-height: 390px; }
      .chat-band { padding: 10px 10px 30px; }
      .chat-head { align-items: flex-start; flex-direction: column; }
      .chat-title { font-size: 16px; }
      .chat-form { grid-template-columns: 1fr; }
      .send { width: 100%; }
      .bubble { font-size: 14px; }
    }
    @media (prefers-reduced-transparency: reduce) {
      .topbar, .btn, .fallback-card, .chat-shell {
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        background: var(--bg-2);
      }
      .btn.primary { background: linear-gradient(180deg, #ecdaae, #d2ad5c 54%, #b68a3f); }
      .chat-log { background: #0b0e13; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="188 프라임에셋 허브로 이동">
      <span class="mark">188</span>
      <span class="brand-text">188본부 시스템안내서</span>
    </a>
    <nav class="actions" aria-label="페이지 동작">
      <a class="btn" href="/">허브</a>
      <a class="btn primary" id="openExternal" target="_blank" rel="noopener">새 창</a>
    </nav>
  </header>

  <main>
    <section class="guide-wrap" aria-label="시스템안내서">
      <iframe id="systemFrame" title="188본부 시스템안내서" loading="eager"></iframe>
      <div class="fallback" id="fallback" aria-hidden="true">
        <div class="fallback-card">
          <h1>188본부 시스템안내서</h1>
          <p>브라우저에서 프레임 표시가 지연되면 새 창으로 바로 열 수 있습니다.</p>
          <a class="btn primary" id="fallbackOpen" target="_blank" rel="noopener">새 창으로 열기</a>
        </div>
      </div>
    </section>

    <section class="chat-band" aria-label="위촉진행 AI 챗봇">
      <div class="chat-shell">
        <div class="chat-head">
          <h2 class="chat-title">위촉진행 AI입니다. 궁금한 점을 물어보세요</h2>
          <div class="chat-state" id="chatState">자료 기반 답변</div>
        </div>
        <div class="chat-notice">정확한 내용은 유치인과 꼭 이야기를 나눠야 합니다 ^^ 188본부에 오신 걸 환영합니다~!</div>
        <div class="chat-log" id="chatLog" aria-live="polite">
          <div class="msg ai">
            <div class="meta">위촉진행 AI</div>
            <div class="bubble">위촉 절차, 준비서류, 188본부 안내, 시스템 용도를 물어보세요. 접속 비밀번호나 내부 제작 방식은 안내하지 않습니다.</div>
          </div>
        </div>
        <form class="chat-form" id="chatForm">
          <input class="chat-input" id="chatInput" name="question" autocomplete="off" maxlength="600" placeholder="예: 위촉은 어떤 순서로 진행되나요?">
          <button class="btn primary send" id="sendBtn" type="submit">전송</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const systemGuideUrl = 'https://script.google.com/macros/s/AKfycbzqX3lETPADpPAG6syoAsEG1cSceMcUUqmeEhYj3ukkbFfHPEnbdvq8W448ttC0vcFefw/exec';
    const chatApiUrl = 'https://script.google.com/macros/s/AKfycbwxsEPxs_uq5H4gH43Ie_FH0mrKAtdkrnzP-30b52GKTBMXVzARfgggs6_klkyadIVl/exec';
    const frame = document.getElementById('systemFrame');
    const fallback = document.getElementById('fallback');
    document.getElementById('openExternal').href = systemGuideUrl;
    document.getElementById('fallbackOpen').href = systemGuideUrl;
    frame.src = systemGuideUrl;
    let loaded = false;
    frame.addEventListener('load', () => {
      loaded = true;
      fallback.classList.remove('show');
      fallback.setAttribute('aria-hidden', 'true');
    });
    window.setTimeout(() => {
      if (!loaded) {
        fallback.classList.add('show');
        fallback.setAttribute('aria-hidden', 'false');
      }
    }, 4500);

    const form = document.getElementById('chatForm');
    const input = document.getElementById('chatInput');
    const log = document.getElementById('chatLog');
    const state = document.getElementById('chatState');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text, label) {
      const msg = document.createElement('div');
      msg.className = 'msg ' + role;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = label;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (role === 'ai') {
        bubble.innerHTML = formatAnswerHtml(text);
      } else {
        bubble.textContent = text;
      }
      msg.append(meta, bubble);
      log.appendChild(msg);
      log.scrollTop = log.scrollHeight;
      return msg;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatAnswerHtml(text) {
      let clean = String(text || '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/__(.*?)__/g, '$1')
        .replace(/^\s{0,3}#{1,6}\s*/gm, '')
        .replace(/^\s*[-*]\s+/gm, '• ')
        .trim();
      if (!clean) return '답변을 생성하지 못했습니다. 다시 질문해주세요.';

      const lines = clean.split(/\n+/).map(line => line.trim()).filter(Boolean);
      const html = [];
      let list = [];
      const flushList = () => {
        if (!list.length) return;
        html.push('<ul>' + list.map(item => '<li>' + escapeHtml(item) + '</li>').join('') + '</ul>');
        list = [];
      };

      lines.forEach(line => {
        const item = line.match(/^(?:•|\d+[.)])\s*(.+)$/);
        if (item) {
          list.push(item[1]);
          return;
        }
        flushList();
        html.push('<p>' + escapeHtml(line) + '</p>');
      });
      flushList();
      return html.join('');
    }

    function setBusy(on) {
      input.disabled = on;
      sendBtn.disabled = on;
      state.textContent = on ? '답변 작성 중' : '자료 기반 답변';
    }

    async function askByPost(question) {
      const res = await fetch(chatApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ chat188: 1, question })
      });
      if (!res.ok) throw new Error('post failed');
      return res.json();
    }

    function askByJsonp(question) {
      return new Promise((resolve, reject) => {
        const cb = 'chat188Cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error('timeout'));
        }, 45000);
        function cleanup() {
          window.clearTimeout(timer);
          delete window[cb];
          script.remove();
        }
        window[cb] = data => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error('jsonp failed'));
        };
        script.src = chatApiUrl + '?chat188=1&callback=' + encodeURIComponent(cb) + '&q=' + encodeURIComponent(question);
        document.head.appendChild(script);
      });
    }

    async function ask(question) {
      return askByJsonp(question);
    }

    function isSensitiveQuestion(question) {
      return /(비번|비밀번호|패스워드|password|접근코드|접속코드|관리자|어드민|admin|9262|만들|제작|개발|구현|코드|소스|배포|GAS|Apps Script|API\s*키|프롬프트|내부\s*구조|서버)/i.test(question);
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      addMessage('user', question, '질문');
      input.value = '';
      if (isSensitiveQuestion(question)) {
        addMessage('ai', '보안상 안내할 수 없으며, 담당 관리자에게 문의해주세요.', '위촉진행 AI');
        input.focus();
        return;
      }
      setBusy(true);
      const pending = addMessage('ai', '확인 중입니다.', '위촉진행 AI');
      try {
        const data = await ask(question);
        pending.querySelector('.bubble').innerHTML = formatAnswerHtml(data && data.answer ? data.answer : '답변을 생성하지 못했습니다. 다시 질문해주세요.');
      } catch (err) {
        pending.querySelector('.bubble').innerHTML = formatAnswerHtml('일시적으로 답변을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
      } finally {
        setBusy(false);
        input.focus();
      }
    });
  </script>
  <script src="/assets/hub-menu.js?v=20260630-hubtools" defer></script>
</body>
</html>
