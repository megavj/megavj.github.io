<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#050607">
  <title>김상현 이사 상담 CTA 테스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="spark-canvas" aria-hidden="true"></canvas>
  <div class="ambient ambient-a" aria-hidden="true"></div>
  <div class="ambient ambient-b" aria-hidden="true"></div>

  <main class="stage">
    <p class="lab-label">CTA MOTION LAB</p>

    <section class="contact-unit" aria-label="김상현 이사 상담">
      <div class="energy-field" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>

      <a class="meeting-orbit" href="https://open.kakao.com/o/sFMF26y" target="_blank" rel="noopener noreferrer">
        <span class="orbit orbit-outer" aria-hidden="true"></span>
        <span class="orbit orbit-mid" aria-hidden="true"></span>
        <span class="orbit orbit-inner" aria-hidden="true"></span>
        <span class="meeting-surface">
          <span class="meeting-kicker">PRIVATE MEETING</span>
          <strong>김상현 이사와<br>이야기하기</strong>
          <span class="meeting-arrow" aria-hidden="true">↗</span>
        </span>
      </a>

      <a class="phone" href="tel:01087149262">
        <span class="phone-caption">DIRECT CONTACT</span>
        <strong>010-8714-9262</strong>
        <span class="phone-line" aria-hidden="true"></span>
      </a>
    </section>

    <p class="lab-guide">버튼에 마우스를 올려 효과를 확인하세요</p>
  </main>

  <script src="./motion.js"></script>
</body>
</html>
