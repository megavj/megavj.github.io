<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프리미엄 통합페이지 | 188 프라임에셋</title>
  <meta name="description" content="프리미엄 통합페이지를 188 프라임에셋 허브에서 바로 실행합니다.">
  <meta name="theme-color" content="#0d1016">
  <style>
    :root {
      --bg: #0d1016;
      --ink: #f5f7fb;
      --muted: #aeb7c4;
      --line: rgba(255,255,255,.14);
      --gold: #d5b56b;
      --panel: rgba(12,15,21,.78);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(213,181,107,.12), transparent 34%),
        linear-gradient(225deg, rgba(78,114,168,.18), transparent 38%),
        var(--bg);
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(20px) saturate(1.25);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 820;
      letter-spacing: 0;
    }
    .mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(213,181,107,.56);
      border-radius: 7px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      background: rgba(213,181,107,.08);
      flex: 0 0 auto;
    }
    .brand-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255,255,255,.055);
      color: #e9edf4;
      font-size: 13px;
      font-weight: 740;
    }
    .btn.primary {
      border-color: rgba(213,181,107,.58);
      color: #11141a;
      background: linear-gradient(180deg, #eddcae, #d5b56b 54%, #ad8440);
    }
    .frame-wrap {
      height: calc(100% - 54px);
      position: relative;
      background: #0b0d12;
    }
    iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #0b0d12;
    }
    .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }
    .fallback-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(13,16,22,.86);
      box-shadow: 0 24px 80px rgba(0,0,0,.36);
      padding: 22px;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: auto;
    }
    .fallback.show .fallback-card {
      opacity: 1;
      transform: none;
    }
    .fallback h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    .fallback p {
      margin: 10px 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      word-break: keep-all;
    }
    @media (max-width: 640px) {
      .topbar {
        height: 58px;
        padding: 0 12px;
      }
      .brand-text { max-width: 156px; }
      .btn { padding: 0 10px; font-size: 12px; }
      .frame-wrap { height: calc(100% - 58px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="188 프라임에셋 허브로 이동">
      <span class="mark">188</span>
      <span class="brand-text">프리미엄 통합페이지</span>
    </a>
    <nav class="actions" aria-label="페이지 동작">
      <a class="btn" href="/">허브</a>
      <a class="btn primary" id="openExternal" target="_blank" rel="noopener">새 창</a>
    </nav>
  </header>

  <main class="frame-wrap">
    <iframe id="premiumFrame" title="프리미엄 통합페이지" loading="eager"></iframe>
    <div class="fallback" id="fallback" aria-hidden="true">
      <div class="fallback-card">
        <h1>프리미엄 통합페이지</h1>
        <p>브라우저에서 프레임 표시가 지연되면 새 창으로 바로 열 수 있습니다.</p>
        <a class="btn primary" id="fallbackOpen" target="_blank" rel="noopener">새 창으로 열기</a>
      </div>
    </div>
  </main>

  <script>
    const premiumHubUrl = 'https://script.google.com/macros/s/AKfycbz4moHHAAJ51F4f1CnAK6CbadsWN5Pmqy24ifeFODXAkpM-aBKipNSYXiZ52TtRaeFwWg/exec';
    const frame = document.getElementById('premiumFrame');
    const fallback = document.getElementById('fallback');
    document.getElementById('openExternal').href = premiumHubUrl;
    document.getElementById('fallbackOpen').href = premiumHubUrl;
    frame.src = premiumHubUrl;
    let loaded = false;
    frame.addEventListener('load', () => {
      loaded = true;
      fallback.classList.remove('show');
      fallback.setAttribute('aria-hidden', 'true');
    });
    window.setTimeout(() => {
      if (!loaded) {
        fallback.classList.add('show');
        fallback.setAttribute('aria-hidden', 'false');
      }
    }, 4500);
  </script>
</body>
</html>
