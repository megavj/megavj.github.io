<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프리미엄 통합페이지로 이동</title>
  <meta name="description" content="프리미엄 통합페이지 독립 실행 화면으로 이동합니다.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0d1016">
  <style>
    :root {
      --bg:#0d1016;
      --ink:#f5f7fb;
      --muted:#aeb7c4;
      --line:rgba(255,255,255,.14);
      --gold:#d5b56b;
      font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
      color-scheme:dark;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:var(--ink);
      background:
        linear-gradient(135deg, rgba(213,181,107,.12), transparent 34%),
        linear-gradient(225deg, rgba(78,114,168,.18), transparent 38%),
        var(--bg);
    }
    .card {
      width:min(460px, 100%);
      border:1px solid var(--line);
      border-radius:8px;
      background:rgba(12,15,21,.82);
      box-shadow:0 24px 80px rgba(0,0,0,.36);
      padding:24px;
      text-align:center;
      backdrop-filter:blur(20px) saturate(1.2);
    }
    .mark {
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
      border:1px solid rgba(213,181,107,.56);
      border-radius:8px;
      color:var(--gold);
      font-weight:900;
      background:rgba(213,181,107,.08);
    }
    h1 { margin:0; font-size:22px; letter-spacing:0; }
    p { margin:10px 0 18px; color:var(--muted); line-height:1.6; font-size:14px; word-break:keep-all; }
    a {
      min-height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 16px;
      border-radius:7px;
      border:1px solid rgba(213,181,107,.58);
      color:#11141a;
      background:linear-gradient(180deg, #eddcae, #d5b56b 54%, #ad8440);
      text-decoration:none;
      font-size:14px;
      font-weight:800;
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="mark">188</div>
    <h1>프리미엄 통합페이지로 이동합니다</h1>
    <p>이 화면은 188 허브의 이동 경로입니다. 입력 오류를 막기 위해 iframe 없이 독립 실행 페이지로 바로 이동합니다.</p>
    <a id="go" href="https://script.google.com/macros/s/AKfycbz4moHHAAJ51F4f1CnAK6CbadsWN5Pmqy24ifeFODXAkpM-aBKipNSYXiZ52TtRaeFwWg/exec">바로 열기</a>
  </main>
  <script>
    const target = 'https://script.google.com/macros/s/AKfycbz4moHHAAJ51F4f1CnAK6CbadsWN5Pmqy24ifeFODXAkpM-aBKipNSYXiZ52TtRaeFwWg/exec';
    document.getElementById('go').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
